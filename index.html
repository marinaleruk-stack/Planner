<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planner</title>

<meta name="theme-color" content="#cfd8cc">

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background:#eef1ec;
  margin:0;
  padding:10px;
}
.container {
  max-width:1100px;
  margin:auto;
  background:#fff;
  padding:24px;
  border-radius:16px;
  box-shadow:0 6px 20px rgba(0,0,0,0.06);
}
h1 { text-align:center; }
h2 {
  margin-top:24px;
  font-size:18px;
}
h2::after {
  content:"";
  display:block;
  width:40px;
  height:2px;
  background:#cfd8cc;
  margin-top:6px;
  border-radius:2px;
}
input, textarea {
  width:100%;
  padding:10px;
  border-radius:10px;
  border:1px solid #ddd;
  margin-top:5px;
}
textarea { min-height:70px; }
.nav {
  display:flex;
  gap:6px;
  justify-content:space-between;
  align-items:center;
  margin-bottom:10px;
  flex-wrap:wrap;
}
button {
  padding:8px 12px;
  border:none;
  border-radius:8px;
  background:#dfe6dc;
}
.deen {
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  margin-top:10px;
}
.calendar {
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:5px;
  margin-top:10px;
}
.day {
  padding:10px;
  text-align:center;
  background:#f7f7f7;
  border-radius:8px;
  cursor:pointer;
}
.day.active {
  background:#cfd8cc;
  font-weight:600;
}
#deenChart {
  display:flex;
  align-items:flex-end;
  height:90px;
  gap:4px;
  margin-top:8px;
}
#deenChart div {
  flex:1;
  border-radius:4px 4px 0 0;
}
#weeklyView div {
  background:#f6f7f5;
  padding:10px;
  border-radius:8px;
  margin-bottom:10px;
}
@media (min-width:900px) {
  .deen { grid-template-columns:repeat(4,1fr); }
  textarea { min-height:90px; }
}

/* DARK MODE */
body.dark {
  background:#1f1f1f;
  color:#eaeaea;
}
body.dark .container { background:#2b2b2b; }
body.dark input, body.dark textarea {
  background:#1e1e1e;
  color:#eaeaea;
  border-color:#444;
}
body.dark .day { background:#333; }
body.dark .day.active { background:#4a5a4a; }
</style>
</head>

<body>

<!-- PIN LOCK -->
<div id="lockScreen" style="display:none;position:fixed;inset:0;background:#000a;z-index:999;align-items:center;justify-content:center;">
  <div style="background:#fff;padding:20px;border-radius:12px;text-align:center;">
    <h3>Enter PIN</h3>
    <input type="password" id="pinInput" maxlength="4" style="text-align:center;">
    <button onclick="unlock()">Unlock</button>
  </div>
</div>

<div class="container">

<h1>Planner</h1>

<div class="nav">
  <button onclick="prevDay()">◀</button>
  <input type="date" id="date">
  <button onclick="nextDay()">▶</button>
  <button onclick="toggleWeekly()">📅 Week</button>
  <button onclick="toggleDark()">🌙</button>
  <button onclick="backupData()">💾 Backup</button>
  <label>
    📥 Restore
    <input type="file" hidden onchange="restoreData(this.files[0])">
  </label>
</div>

<h2>Top 3 Priorities</h2>
<textarea id="priorities"></textarea>

<h2>Tasks</h2>
<textarea id="tasks"></textarea>

<h2>Deen Tracker</h2>

<div id="deenStats">
  🔥 Streak: <span id="deenStreak">0</span> days |
  📊 This month: <span id="deenMonth">0</span> days
</div>

<div class="deen">
  <label><input type="checkbox" id="morning"> Morning</label>
  <label><input type="checkbox" id="evening"> Evening</label>
  <label><input type="checkbox" id="istighfar"> Istighfar</label>
  <label><input type="checkbox" id="subhan"> SubhanAllah</label>
  <label><input type="checkbox" id="tahlil"> La ilaha illa Allah</label>
  <label><input type="checkbox" id="salawat"> Salawat</label>
  <label><input type="checkbox" id="quran"> Quran</label>
  <label><input type="checkbox" id="tahajjud"> Tahajjud</label>
</div>

<h3>📈 Deen Progress</h3>
<div id="deenChart"></div>

<h2>Notes</h2>
<textarea id="notes"></textarea>

<h2>Reflection</h2>
<textarea id="reflection"></textarea>

<div id="weeklyView" style="display:none;">
  <h2>Weekly Review</h2>
  <div id="weekContent"></div>
</div>

<h2>Monthly View</h2>
<div id="calendar" class="calendar"></div>

</div>

<script>
const textFields=['priorities','tasks','notes','reflection'];
const checkFields=['morning','evening','istighfar','subhan','tahlil','salawat','quran','tahajjud'];
const dateInput=document.getElementById('date');

function key(d){return 'planner-'+d}

function saveData(){
  const k=key(dateInput.value);
  const data={};
  textFields.forEach(i=>data[i]=document.getElementById(i).value);
  checkFields.forEach(i=>data[i]=document.getElementById(i).checked);
  localStorage.setItem(k,JSON.stringify(data));
  updateDeen();
  renderChart();
  calendar();
}

function loadData(){
  const data=JSON.parse(localStorage.getItem(key(dateInput.value))||'{}');
  textFields.forEach(i=>document.getElementById(i).value=data[i]||'');
  checkFields.forEach(i=>document.getElementById(i).checked=data[i]||false);
  updateDeen();
  renderChart();
}

function changeDay(o){
  saveData();
  const d=new Date(dateInput.value);
  d.setDate(d.getDate()+o);
  dateInput.value=d.toISOString().split('T')[0];
  loadData();
  calendar();
}
function prevDay(){changeDay(-1)}
function nextDay(){changeDay(1)}

textFields.forEach(i=>document.getElementById(i).oninput=saveData);
checkFields.forEach(i=>document.getElementById(i).onchange=saveData);
dateInput.onchange=()=>{loadData();calendar();}

function hasDeen(d){
  const data=JSON.parse(localStorage.getItem(key(d))||'{}');
  return checkFields.some(i=>data[i]);
}

function updateDeen(){
  let streak=0;
  let d=new Date(dateInput.value);
  while(hasDeen(d.toISOString().split('T')[0])){
    streak++;
    d.setDate(d.getDate()-1);
  }
  document.getElementById('deenStreak').textContent=streak;

  const base=new Date(dateInput.value);
  let m=0;
  const days=new Date(base.getFullYear(),base.getMonth()+1,0).getDate();
  for(let i=1;i<=days;i++){
    const ds=`${base.getFullYear()}-${String(base.getMonth()+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
    if(hasDeen(ds))m++;
  }
  document.getElementById('deenMonth').textContent=m;
}

function renderChart(){
  const c=document.getElementById('deenChart');
  c.innerHTML='';
  const base=new Date(dateInput.value);
  const days=new Date(base.getFullYear(),base.getMonth()+1,0).getDate();
  for(let i=1;i<=days;i++){
    const ds=`${base.getFullYear()}-${String(base.getMonth()+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
    const b=document.createElement('div');
    b.style.background=hasDeen(ds)?'#7da87d':'#ccc';
    c.appendChild(b);
  }
}

function calendar(){
  const cal=document.getElementById('calendar');
  cal.innerHTML='';
  const base=new Date(dateInput.value);
  const days=new Date(base.getFullYear(),base.getMonth()+1,0).getDate();
  for(let i=1;i<=days;i++){
    const d=document.createElement('div');
    d.className='day';
    d.textContent=i;
    const ds=`${base.getFullYear()}-${String(base.getMonth()+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
    if(localStorage.getItem(key(ds)))d.classList.add('active');
    d.onclick=()=>{dateInput.value=ds;loadData();calendar();}
    cal.appendChild(d);
  }
}

function toggleWeekly(){
  const w=document.getElementById('weeklyView');
  w.style.display=w.style.display==='none'?'block':'none';
  if(w.style.display==='block'){week();}
}

function week(){
  const c=document.getElementById('weekContent');
  c.innerHTML='';
  const base=new Date(dateInput.value);
  base.setDate(base.getDate()-((base.getDay()+6)%7));
  for(let i=0;i<7;i++){
    const d=new Date(base);
    d.setDate(base.getDate()+i);
    const ds=d.toISOString().split('T')[0];
    const data=JSON.parse(localStorage.getItem(key(ds))||'{}');
    const div=document.createElement('div');
    div.innerHTML=`<strong>${ds}</strong><br>Priorities: ${data.priorities||'-'}<br>Tasks: ${data.tasks||'-'}`;
    c.appendChild(div);
  }
}

function backupData(){
  const all={};
  Object.keys(localStorage).filter(k=>k.startsWith('planner-')).forEach(k=>all[k]=JSON.parse(localStorage.getItem(k)));
  const b=new Blob([JSON.stringify(all,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(b);
  a.download='planner-backup.json';
  a.click();
}

function restoreData(f){
  const r=new FileReader();
  r.onload=()=>{const d=JSON.parse(r.result);Object.keys(d).forEach(k=>localStorage.setItem(k,JSON.stringify(d[k])));loadData();calendar();}
  r.readAsText(f);
}

function toggleDark(){
  document.body.classList.toggle('dark');
  localStorage.setItem('dark',document.body.classList.contains('dark'));
}
if(localStorage.getItem('dark')==='true')document.body.classList.add('dark');

function unlock(){
  if(document.getElementById('pinInput').value===localStorage.getItem('pin'))document.getElementById('lockScreen').style.display='none';
}
if(localStorage.getItem('pin'))document.getElementById('lockScreen').style.display='flex';

dateInput.value=new Date().toISOString().split('T')[0];
loadData();calendar();
</script>
</body>
</html>
